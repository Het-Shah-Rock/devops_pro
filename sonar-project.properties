sonar.projectKey=quickcart-enterprise
sonar.projectName=QuickCart Enterprise - DevOps Project
sonar.projectVersion=1.0

# Source directories to scan
sonar.sources=.
sonar.inclusions=app.py,database.py,seed.py,pages/**/*.py,tests/**/*.py

# Exclusions - skip auto-generated or third-party files
sonar.exclusions=**/__pycache__/**,**/.pytest_cache/**,**/node_modules/**,quickcart.db

# Language
sonar.language=py

# Python test reports
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# SonarQube Server URL
sonar.host.url=http://localhost:9000

# Login token - will be set after first login
sonar.token=sqa_placeholder_replace_after_login
